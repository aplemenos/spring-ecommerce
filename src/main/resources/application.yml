server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: spring-ecommerce

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:6543/ecommerce}
    username: ${DB_USERNAME:ecommerce}
    password: ${DB_PASSWORD:ecommerce}

  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, never by Hibernate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  # Dev-only default. In production ALWAYS set JWT_SECRET as an environment variable.
  # HS256 requires at least 256 bits (32+ characters).
  secret: ${JWT_SECRET:dev-only-secret-change-me-in-production-min-32-chars}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}   # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
